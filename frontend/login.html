<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">

        <!-- Logo y título -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-4 shadow-lg">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Libro abierto -->
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                        <!-- Líneas de texto izquierda -->
                        <line x1="10" y1="18" x2="21" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="22" x2="21" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="26" x2="21" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Líneas de texto derecha -->
                        <line x1="27" y1="16" x2="38" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="27" y1="20" x2="38" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="27" y1="24" x2="38" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Estrella de graduación -->
                        <circle cx="24" cy="7" r="4" fill="white" fill-opacity="0.9"/>
                        <path d="M24 4L24.8 6.4H27.4L25.3 7.9L26.1 10.3L24 8.8L21.9 10.3L22.7 7.9L20.6 6.4H23.2L24 4Z" fill="#4F46E5"/>
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Sistema de Gestión Escolar</h1>
            <p class="text-gray-500 mt-1">Ingresa con tu cuenta</p>
        </div>

        <!-- Formulario -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    placeholder="tu@correo.com"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <!-- Mensaje de error -->
            <div id="error" class="hidden bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>

            <!-- Botón -->
            <button
                onclick="iniciarSesion()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200"
            >
                Ingresar
            </button>
        </div>

    </div>

    <script>
        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!email || !password) {
                errorDiv.textContent = 'Por favor completa todos los campos';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const respuesta = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `username=${email}&password=${password}`
                });

                const datos = await respuesta.json();

                if (!respuesta.ok) {
                    errorDiv.textContent = 'Email o contraseña incorrectos';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                localStorage.setItem('token', datos.access_token);
                localStorage.setItem('nombre', datos.nombre);
                localStorage.setItem('apellido', datos.apellido);

                window.location.href = 'dashboard.html';

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>

</body>
</html>
