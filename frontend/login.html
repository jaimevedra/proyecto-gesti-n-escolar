<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Iniciar Sesión</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script>
    tailwind.config = {
        darkMode: 'class'
    }
</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center transition duration-300"></body>

    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-10 w-full max-w-md">

        <!-- Logo y título -->
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-4 shadow-lg">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <!-- Libro abierto -->
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                        <!-- Líneas de texto izquierda -->
                        <line x1="10" y1="18" x2="21" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="22" x2="21" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10" y1="26" x2="21" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Líneas de texto derecha -->
                        <line x1="27" y1="16" x2="38" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="27" y1="20" x2="38" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="27" y1="24" x2="38" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <!-- Estrella de graduación -->
                        <circle cx="24" cy="7" r="4" fill="white" fill-opacity="0.9"/>
                        <path d="M24 4L24.8 6.4H27.4L25.3 7.9L26.1 10.3L24 8.8L21.9 10.3L22.7 7.9L20.6 6.4H23.2L24 4Z" fill="#4F46E5"/>
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Sistema de Gestión Escolar</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Ingresa con tu cuenta</p>
        </div>

        <!-- Formulario -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo electrónico</label>
                 <input
                 type="email"
                 id="email"
                 placeholder="tu@correo.com"
                 class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contraseña</label>
                 <input
                 type="password"
                 id="password"
                 placeholder="••••••••"
                 class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"

                >
            </div>

            <!-- Mensaje de error -->
            <div id="error" class="hidden bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>

            <!-- Botón -->
            <button
                onclick="iniciarSesion()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200"
            >
                Ingresar
            </button>
        </div>

    </div>

    <script>
        async function iniciarSesion() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (!email || !password) {
                errorDiv.textContent = 'Por favor completa todos los campos';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const respuesta = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `username=${email}&password=${password}`
                });

                const datos = await respuesta.json();

                if (!respuesta.ok) {
                    errorDiv.textContent = 'Email o contraseña incorrectos';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                localStorage.setItem('token', datos.access_token);
                localStorage.setItem('nombre', datos.nombre);
                localStorage.setItem('apellido', datos.apellido);
                localStorage.setItem('rol', datos.rol);
                localStorage.setItem('grado_asignado', datos.grado_asignado || '');
                localStorage.setItem('profesorId', datos.id);
                localStorage.setItem('email', datos.email);

                window.location.href = 'dashboard.html';

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }
    </script>
<!-- Botón modo oscuro -->
    <button
        onclick="toggleModo()"
        class="fixed top-4 right-4 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 shadow-sm hover:shadow-md transition duration-200"
    >
        <svg id="iconoSol" width="20" height="20" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconoLuna" class="hidden" width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script>
        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
    </script>
</body>
</html>
