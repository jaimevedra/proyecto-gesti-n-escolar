<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Registrar Profesor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
                <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm"></span>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button onclick="toggleModo()" class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200">
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-3xl mx-auto px-6 py-8">

        <!-- Bloqueo de acceso para no-rectores -->
        <div id="bloqueoAcceso" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-10 text-center">
            <div class="text-5xl mb-4">🔒</div>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">Acceso restringido</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Solo el rector puede registrar nuevos profesores</p>
            <a href="dashboard.html" class="inline-block mt-4 text-blue-600 hover:text-blue-700 font-medium">Volver al dashboard</a>
        </div>

        <!-- Contenido solo para rector -->
        <div id="contenidoRector" class="hidden">

            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Registrar profesor</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Crea una nueva cuenta de profesor en el colegio</p>
            </div>

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre</label>
                        <input type="text" id="nombre" placeholder="Nombre"
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Apellido</label>
                        <input type="text" id="apellido" placeholder="Apellido"
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo electrónico</label>
                        <input type="email" id="email" placeholder="correo@colegio.edu.co"
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Contraseña temporal</label>
                        <input type="password" id="password" placeholder="El profesor podrá cambiarla después"
                            class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Rol</label>
                        <select id="rol" onchange="mostrarCamposSegunRol()" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="profesor">Profesor de asignatura</option>
                            <option value="director">Director de grupo</option>
                            <option value="rector">Rector</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Asignatura que dicta</label>
                        <select id="materiaId" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Selecciona una asignatura</option>
                        </select>
                    </div>
                    <div id="campoGrado" class="hidden md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Grado a dirigir</label>
                        <select id="gradoAsignado" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Selecciona un grado</option>
                            <option value="Jardín">Jardín</option>
                            <option value="Transición">Transición</option>
                            <option value="1°">Grado 1°</option>
                            <option value="2°">Grado 2°</option>
                            <option value="3°">Grado 3°</option>
                            <option value="4°">Grado 4°</option>
                            <option value="5°">Grado 5°</option>
                            <option value="6°">Grado 6°</option>
                            <option value="7°">Grado 7°</option>
                            <option value="8°">Grado 8°</option>
                            <option value="9°">Grado 9°</option>
                            <option value="10°">Grado 10°</option>
                            <option value="11°">Grado 11°</option>
                        </select>
                    </div>
                </div>

                <div class="mt-5">
                    <button onclick="registrarProfesor()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                        Crear profesor
                    </button>
                </div>

                <div id="mensajeError" class="hidden mt-3 bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>
                <div id="mensajeExito" class="hidden mt-3 bg-green-50 text-green-600 text-sm rounded-xl px-4 py-3"></div>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');
        const rolActual = localStorage.getItem('rol');

        if (!token) window.location.href = 'login.html';

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;

        // Verificar permisos antes de mostrar nada
        if (rolActual === 'rector') {
            document.getElementById('contenidoRector').classList.remove('hidden');
            cargarAsignaturas();
        } else {
            document.getElementById('bloqueoAcceso').classList.remove('hidden');
        }

        function mostrarCamposSegunRol() {
            const rol = document.getElementById('rol').value;
            const campoGrado = document.getElementById('campoGrado');
            if (rol === 'director') {
                campoGrado.classList.remove('hidden');
            } else {
                campoGrado.classList.add('hidden');
            }
        }

        async function cargarAsignaturas() {
            try {
                const res = await fetch('http://127.0.0.1:8000/materias/colegio/1', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const materias = await res.json();
                const select = document.getElementById('materiaId');
                materias.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nombre}</option>`;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function registrarProfesor() {
            const nombreVal = document.getElementById('nombre').value;
            const apellidoVal = document.getElementById('apellido').value;
            const emailVal = document.getElementById('email').value;
            const passwordVal = document.getElementById('password').value;
            const rolVal = document.getElementById('rol').value;
            const materiaVal = document.getElementById('materiaId').value;
            const gradoVal = document.getElementById('gradoAsignado').value;
            const errorDiv = document.getElementById('mensajeError');
            const exitoDiv = document.getElementById('mensajeExito');

            if (!nombreVal || !apellidoVal || !emailVal || !passwordVal) {
                errorDiv.textContent = 'Todos los campos obligatorios deben completarse';
                errorDiv.classList.remove('hidden');
                exitoDiv.classList.add('hidden');
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/auth/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        colegio_id: 1,
                        nombre: nombreVal,
                        apellido: apellidoVal,
                        email: emailVal,
                        password: passwordVal,
                        rol: rolVal,
                        grado_asignado: rolVal === 'director' ? gradoVal : null,
                        materia_asignada_id: materiaVal ? parseInt(materiaVal) : null
                    })
                });

                if (!res.ok) {
                    const datos = await res.json();
                    errorDiv.textContent = datos.detail || 'Error al crear el profesor';
                    errorDiv.classList.remove('hidden');
                    exitoDiv.classList.add('hidden');
                    return;
                }

                exitoDiv.textContent = 'Profesor registrado correctamente';
                exitoDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');

                document.getElementById('nombre').value = '';
                document.getElementById('apellido').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('rol').value = 'profesor';
                document.getElementById('materiaId').value = '';
                document.getElementById('gradoAsignado').value = '';
                document.getElementById('campoGrado').classList.add('hidden');

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            localStorage.removeItem('rol');
            localStorage.removeItem('grado_asignado');
            localStorage.removeItem('profesorId');
            window.location.href = 'login.html';
        }

        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
    </script>

</body>
</html>
