<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Estudiantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
                <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm"></span>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button onclick="toggleModo()" class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200">
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-5xl mx-auto px-6 py-8">
       <!-- Filtro por grado -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 mb-6">
            <div class="flex items-center gap-3">
                <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Filtrar por grado:</label>
                <select id="filtroGrado" onchange="filtrarPorGrado()" class="border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Todos los grados</option>
                    <option value="1°">Grado 1°</option>
                    <option value="2°">Grado 2°</option>
                    <option value="3°">Grado 3°</option>
                    <option value="4°">Grado 4°</option>
                    <option value="5°">Grado 5°</option>
                    <option value="6°">Grado 6°</option>
                    <option value="7°">Grado 7°</option>
                    <option value="8°">Grado 8°</option>
                    <option value="9°">Grado 9°</option>
                    <option value="10°">Grado 10°</option>
                    <option value="11°">Grado 11°</option>
                </select>
                <span id="totalFiltrado" class="text-sm text-gray-500 dark:text-gray-400"></span>
            </div>
        </div>
        <!-- Título y botón agregar -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Estudiantes</h1>
                <p class="text-gray-500 dark:text-gray-400 mt-1">Gestiona los estudiantes del colegio</p>
            </div>
            <button
                onclick="mostrarFormulario()"
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200"
            >
                + Agregar estudiante
            </button>
        </div>

        <!-- Formulario agregar estudiante -->
        <div id="formulario" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Nuevo estudiante</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Apellido</label>
                    <input type="text" id="apellido" placeholder="Apellido"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Grado</label>
                    <input type="text" id="grado" placeholder="Ej: 6°"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Fecha de nacimiento</label>
                    <input type="date" id="fechaNacimiento"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="agregarEstudiante()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Guardar
                </button>
                <button onclick="ocultarFormulario()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-700 dark:text-gray-300 font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Cancelar
                </button>
            </div>
            <div id="mensajeError" class="hidden mt-3 bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>
            <div id="mensajeExito" class="hidden mt-3 bg-green-50 text-green-600 text-sm rounded-xl px-4 py-3"></div>
        </div>

        <!-- Lista de estudiantes -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
            <div class="p-6 border-b border-gray-100 dark:border-gray-700">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Lista de estudiantes</h2>
            </div>
            <div id="listaEstudiantes" class="divide-y divide-gray-100 dark:divide-gray-700">
                <div class="p-6 text-center text-gray-500 dark:text-gray-400">Cargando...</div>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');

        if (!token) window.location.href = 'login.html';

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;

        async function cargarEstudiantes(grado = '') {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };
                let url = 'http://127.0.0.1:8000/estudiantes/';

                if (grado) {
                    url = `http://127.0.0.1:8000/estudiantes/colegio/1/grado/${encodeURIComponent(grado)}`;
                } else {
                    url = 'http://127.0.0.1:8000/estudiantes/';
                }

                const res = await fetch(url, { headers });
                const estudiantes = await res.json();
                const lista = document.getElementById('listaEstudiantes');
                const total = document.getElementById('totalFiltrado');

                total.textContent = `${estudiantes.length} estudiante(s)`;

                if (estudiantes.length === 0) {
                    lista.innerHTML = '<div class="p-6 text-center text-gray-500 dark:text-gray-400">No hay estudiantes en este grado</div>';
                    return;
                }

                const rol = localStorage.getItem('rol');
                const gradoAsignado = localStorage.getItem('grado_asignado');

                lista.innerHTML = estudiantes.map(e => {
                    const puedeDesactivar = rol === 'rector' ||
                        (rol === 'director' && e.grado === gradoAsignado);

                    return `
                    <div class="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-150">
                        <div class="flex items-center gap-4">
                            <div class="bg-blue-100 dark:bg-blue-900 rounded-full w-10 h-10 flex items-center justify-center">
                                <span class="text-blue-600 dark:text-blue-300 font-semibold text-sm">${e.nombre[0]}${e.apellido[0]}</span>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800 dark:text-white">${e.nombre} ${e.apellido}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">Grado ${e.grado}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-blue-50 dark:bg-blue-900 text-blue-600 dark:text-blue-300 px-3 py-1 rounded-full">Activo</span>
                            ${puedeDesactivar ? `
                            <button onclick="desactivarEstudiante(${e.id})"
                                class="text-xs bg-red-50 dark:bg-red-900 text-red-600 dark:text-red-300 hover:bg-red-100 px-3 py-1 rounded-full transition duration-150">
                                Desactivar
                            </button>` : ''}
                        </div>
                    </div>`;
                }).join('');

            } catch (error) {
                console.error('Error:', error);
            }
        }

        function filtrarPorGrado() {
            const grado = document.getElementById('filtroGrado').value;
            cargarEstudiantes(grado);
        }

        async function agregarEstudiante() {
            const nombreVal = document.getElementById('nombre').value;
            const apellidoVal = document.getElementById('apellido').value;
            const gradoVal = document.getElementById('grado').value;
            const fechaVal = document.getElementById('fechaNacimiento').value;
            const errorDiv = document.getElementById('mensajeError');
            const exitoDiv = document.getElementById('mensajeExito');

            if (!nombreVal || !apellidoVal || !gradoVal) {
                errorDiv.textContent = 'Nombre, apellido y grado son obligatorios';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/estudiantes/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        colegio_id: 1,
                        nombre: nombreVal,
                        apellido: apellidoVal,
                        grado: gradoVal,
                        fecha_nacimiento: fechaVal || null
                    })
                });

                if (!res.ok) {
                    errorDiv.textContent = 'Error al guardar el estudiante';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                exitoDiv.textContent = 'Estudiante agregado correctamente';
                exitoDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');

                document.getElementById('nombre').value = '';
                document.getElementById('apellido').value = '';
                document.getElementById('grado').value = '';
                document.getElementById('fechaNacimiento').value = '';

                setTimeout(() => {
                    ocultarFormulario();
                    cargarEstudiantes();
                }, 1500);

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }

        function mostrarFormulario() {
            document.getElementById('formulario').classList.remove('hidden');
        }

        function ocultarFormulario() {
            document.getElementById('formulario').classList.add('hidden');
            document.getElementById('mensajeError').classList.add('hidden');
            document.getElementById('mensajeExito').classList.add('hidden');
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            window.location.href = 'login.html';
        }

        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
        async function desactivarEstudiante(id) {
            if (!confirm('¿Estás seguro de desactivar este estudiante?')) return;
            
            try {
                const res = await fetch(`http://127.0.0.1:8000/estudiantes/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ activo: false })
                });

                if (res.ok) {
                    cargarEstudiantes();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        cargarEstudiantes();
    </script>

</body>
</html>
