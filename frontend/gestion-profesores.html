<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Gestión de Profesores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
                <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <a href="perfil.html" id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm hover:text-blue-600 transition duration-150"></a>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button onclick="toggleModo()" class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200">
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-5xl mx-auto px-6 py-8">

        <!-- Bloqueo de acceso para no-rectores -->
        <div id="bloqueoAcceso" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-10 text-center">
            <div class="text-5xl mb-4">🔒</div>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">Acceso restringido</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Solo el rector puede gestionar profesores</p>
            <a href="dashboard.html" class="inline-block mt-4 text-blue-600 hover:text-blue-700 font-medium">Volver al dashboard</a>
        </div>

        <!-- Contenido solo para rector -->
        <div id="contenidoRector" class="hidden">

            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Gestión de profesores</h1>
                    <p class="text-gray-500 dark:text-gray-400 mt-1">Administra roles y asignaciones del equipo docente</p>
                </div>
                <a href="registro-profesor.html" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    + Nuevo profesor
                </a>
            </div>

            <!-- Lista de profesores -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                <div class="p-6 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Equipo docente</h2>
                </div>
                <div id="listaProfesores" class="divide-y divide-gray-100 dark:divide-gray-700">
                    <div class="p-6 text-center text-gray-500 dark:text-gray-400">Cargando...</div>
                </div>
            </div>

        </div>

        <!-- Modal de edición -->
        <div id="modalEdicion" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-md mx-4">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Editar asignación</h2>
                <p id="modalNombre" class="text-sm text-gray-500 dark:text-gray-400 mb-4"></p>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Rol</label>
                        <select id="modalRol" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="profesor">Profesor de asignatura</option>
                            <option value="director">Director de grupo</option>
                            <option value="rector">Rector</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Grado a dirigir</label>
                        <select id="modalGrado" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Sin grado asignado</option>
                            <option value="Jardín">Jardín</option>
                            <option value="Transición">Transición</option>
                            <option value="1°">Grado 1°</option>
                            <option value="2°">Grado 2°</option>
                            <option value="3°">Grado 3°</option>
                            <option value="4°">Grado 4°</option>
                            <option value="5°">Grado 5°</option>
                            <option value="6°">Grado 6°</option>
                            <option value="7°">Grado 7°</option>
                            <option value="8°">Grado 8°</option>
                            <option value="9°">Grado 9°</option>
                            <option value="10°">Grado 10°</option>
                            <option value="11°">Grado 11°</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Asignatura que dicta</label>
                        <select id="modalMateria" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Sin asignatura asignada</option>
                        </select>
                    </div>
                </div>

                <div id="modalError" class="hidden mt-3 bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>
                <div id="modalExito" class="hidden mt-3 bg-green-50 text-green-600 text-sm rounded-xl px-4 py-3"></div>

                <div class="flex gap-3 mt-5">
                    <button onclick="guardarAsignacion()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition duration-200">
                        Guardar
                    </button>
                    <button onclick="cerrarModal()" class="flex-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 text-gray-700 dark:text-gray-300 font-semibold py-2.5 rounded-xl transition duration-200">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');
        const rolActual = localStorage.getItem('rol');

        if (!token) window.location.href = 'login.html';

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;

        let profesorEditandoId = null;

        if (rolActual === 'rector') {
            document.getElementById('contenidoRector').classList.remove('hidden');
            cargarProfesores();
            cargarAsignaturas();
        } else {
            document.getElementById('bloqueoAcceso').classList.remove('hidden');
        }

       async function cargarProfesores() {
            try {
                const [resProf, resMat] = await Promise.all([
                    fetch('http://127.0.0.1:8000/profesores/', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch('http://127.0.0.1:8000/materias/colegio/1', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                const profesores = await resProf.json();
                const materias = await resMat.json();
                const materiasMap = {};
                materias.forEach(m => materiasMap[m.id] = m.nombre);

                const lista = document.getElementById('listaProfesores');

                const rolBadge = {
                    'rector': 'bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300',
                    'director': 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300',
                    'profesor': 'bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300'
                };

                const rolNombre = {
                    'rector': 'Rector',
                    'director': 'Director de grupo',
                    'profesor': 'Profesor'
                };

                lista.innerHTML = profesores.map(p => `
                    <div class="p-4 flex items-center justify-between hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-150">
                        <div class="flex items-center gap-4">
                            <div class="bg-blue-100 dark:bg-blue-900 rounded-full w-10 h-10 flex items-center justify-center overflow-hidden">
                                ${p.foto_url ?
                                    `<img src="${p.foto_url}" class="w-10 h-10 rounded-full object-cover">` :
                                    `<span class="text-blue-600 dark:text-blue-300 font-semibold text-sm">${p.nombre[0]}${p.apellido[0]}</span>`
                                }
                            </div>
                            <div>
                                <p class="font-medium text-gray-800 dark:text-white">${p.nombre} ${p.apellido}</p>
                                <p class="text-sm text-gray-500 dark:text-gray-400">${p.email}</p>
                                <div class="flex gap-3 mt-0.5">
                                    ${p.grado_asignado ? `<p class="text-xs text-gray-400 dark:text-gray-500">Grado: ${p.grado_asignado}</p>` : ''}
                                    ${p.materia_asignada_id ? `<p class="text-xs text-gray-400 dark:text-gray-500">Asignatura: ${materiasMap[p.materia_asignada_id] || 'Desconocida'}</p>` : '<p class="text-xs text-gray-400 dark:text-gray-500">Sin asignatura</p>'}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs px-3 py-1 rounded-full font-medium ${rolBadge[p.rol] || rolBadge['profesor']}">
                                ${rolNombre[p.rol] || 'Profesor'}
                            </span>
                            <button onclick="abrirModal(${p.id}, '${p.nombre} ${p.apellido}', '${p.rol}', '${p.grado_asignado || ''}', ${p.materia_asignada_id || null})"
                                class="text-xs bg-amber-50 dark:bg-amber-900 text-amber-600 dark:text-amber-300 hover:bg-amber-100 px-3 py-1 rounded-full transition duration-150">
                                Editar
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error:', error);
            }
        }
        async function cargarAsignaturas() {
            try {
                const res = await fetch('http://127.0.0.1:8000/materias/colegio/1', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const materias = await res.json();
                const select = document.getElementById('modalMateria');
                materias.forEach(m => {
                    select.innerHTML += `<option value="${m.id}">${m.nombre}</option>`;
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function abrirModal(id, nombre, rol, grado, materiaId) {
            profesorEditandoId = id;
            document.getElementById('modalNombre').textContent = `Editando: ${nombre}`;
            document.getElementById('modalRol').value = rol;
            document.getElementById('modalGrado').value = grado;
            if (materiaId) document.getElementById('modalMateria').value = materiaId;
            document.getElementById('modalError').classList.add('hidden');
            document.getElementById('modalExito').classList.add('hidden');
            document.getElementById('modalEdicion').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalEdicion').classList.add('hidden');
            profesorEditandoId = null;
        }

        async function guardarAsignacion() {
            const rol = document.getElementById('modalRol').value;
            const grado = document.getElementById('modalGrado').value;
            const materiaId = document.getElementById('modalMateria').value;
            const errorDiv = document.getElementById('modalError');
            const exitoDiv = document.getElementById('modalExito');

            try {
                const res = await fetch(`http://127.0.0.1:8000/profesores/${profesorEditandoId}/asignacion`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        rol: rol,
                        grado_asignado: grado || null,
                        materia_asignada_id: materiaId ? parseInt(materiaId) : null
                    })
                });

                if (!res.ok) {
                    errorDiv.textContent = 'Error al guardar los cambios';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                exitoDiv.textContent = 'Asignación actualizada correctamente';
                exitoDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');

                setTimeout(() => {
                    cerrarModal();
                    cargarProfesores();
                }, 1500);

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            localStorage.removeItem('rol');
            localStorage.removeItem('grado_asignado');
            localStorage.removeItem('profesorId');
            window.location.href = 'login.html';
        }

        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
    </script>

</body>
</html>
