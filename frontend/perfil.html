<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Mi Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
                <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm"></span>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button onclick="toggleModo()" class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200">
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-2xl mx-auto px-6 py-8">

        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Mi perfil</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Actualiza tu información personal</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">

            <!-- Foto de perfil -->
            <div class="flex flex-col items-center mb-6">
                <div class="relative">
                    <img id="fotoPreview" src="" class="hidden w-24 h-24 rounded-full object-cover border-4 border-blue-100 dark:border-gray-700">
                    <div id="fotoPlaceholder" class="w-24 h-24 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center text-blue-600 dark:text-blue-300 text-2xl font-bold border-4 border-blue-100 dark:border-gray-700"></div>
                    <label for="inputFoto" class="absolute bottom-0 right-0 bg-blue-600 hover:bg-blue-700 rounded-full p-2 cursor-pointer shadow-md">
                        <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </label>
                    <input type="file" id="inputFoto" accept="image/*" class="hidden" onchange="previsualizarFoto(event)">
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Haz clic en el ícono para cambiar tu foto</p>
            </div>

            <!-- Datos no editables -->
            <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-4 mb-6">
                <p class="text-sm text-gray-500 dark:text-gray-400">Nombre completo</p>
                <p id="nombreCompleto" class="font-medium text-gray-800 dark:text-white"></p>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Correo electrónico</p>
                <p id="emailActual" class="font-medium text-gray-800 dark:text-white"></p>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Rol</p>
                <p id="rolActual" class="font-medium text-gray-800 dark:text-white capitalize"></p>
            </div>

            <!-- Datos editables -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Número de celular</label>
                    <input type="tel" id="celular" placeholder="300 123 4567"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nueva contraseña (déjalo vacío si no quieres cambiarla)</label>
                    <input type="password" id="nuevaPassword" placeholder="••••••••"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="mt-5">
                <button onclick="guardarPerfil()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Guardar cambios
                </button>
            </div>

            <div id="mensajeError" class="hidden mt-3 bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>
            <div id="mensajeExito" class="hidden mt-3 bg-green-50 text-green-600 text-sm rounded-xl px-4 py-3"></div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');
        const rol = localStorage.getItem('rol');
        const email = localStorage.getItem('email');

        if (!token) window.location.href = 'login.html';

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;
        document.getElementById('nombreCompleto').textContent = `${nombre} ${apellido}`;
        document.getElementById('emailActual').textContent = email;
        document.getElementById('rolActual').textContent = rol;
        document.getElementById('fotoPlaceholder').textContent = `${nombre[0]}${apellido[0]}`;

        let fotoBase64 = null;

        function previsualizarFoto(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(e) {
                fotoBase64 = e.target.result;
                document.getElementById('fotoPreview').src = fotoBase64;
                document.getElementById('fotoPreview').classList.remove('hidden');
                document.getElementById('fotoPlaceholder').classList.add('hidden');
            };
            lector.readAsDataURL(archivo);
        }

        async function guardarPerfil() {
            const celularVal = document.getElementById('celular').value;
            const passwordVal = document.getElementById('nuevaPassword').value;
            const errorDiv = document.getElementById('mensajeError');
            const exitoDiv = document.getElementById('mensajeExito');

            const datos = {};
            if (celularVal) datos.celular = celularVal;
            if (passwordVal) datos.password = passwordVal;
            if (fotoBase64) datos.foto_url = fotoBase64;

            try {
                const res = await fetch('http://127.0.0.1:8000/profesores/perfil', {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                if (!res.ok) {
                    errorDiv.textContent = 'Error al guardar los cambios';
                    errorDiv.classList.remove('hidden');
                    exitoDiv.classList.add('hidden');
                    return;
                }

                exitoDiv.textContent = 'Perfil actualizado correctamente';
                exitoDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');
                document.getElementById('nuevaPassword').value = '';

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            localStorage.removeItem('rol');
            localStorage.removeItem('grado_asignado');
            localStorage.removeItem('profesorId');
            window.location.href = 'login.html';
        }

        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
    </script>

</body>
</html>
