<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Notas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="dashboard.html" class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                        <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                        <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                    </svg>
                </div>
                <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <span id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm"></span>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button onclick="toggleModo()" class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200">
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-5xl mx-auto px-6 py-8">

        <!-- Título -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Notas</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Registra y consulta las notas de los estudiantes</p>
        </div>

        <!-- Formulario registrar nota -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Registrar nota</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Estudiante</label>
                    <select id="estudianteId" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Selecciona un estudiante</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Asignatura</label>
                    <select id="materiaId" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Selecciona una asignatura</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Período</label>
                    <select id="periodo" class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="1">Período 1</option>
                        <option value="2">Período 2</option>
                        <option value="3">Período 3</option>
                        <option value="4">Período 4</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nota</label>
                    <input type="number" id="nota" min="0" max="10" step="0.1" placeholder="Ej: 4.5"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Observación (opcional)</label>
                    <input type="text" id="observacion" placeholder="Observación sobre la nota"
                        class="w-full border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="mt-4">
                <button onclick="registrarNota()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Guardar nota
                </button>
            </div>
            <div id="mensajeError" class="hidden mt-3 bg-red-50 text-red-600 text-sm rounded-xl px-4 py-3"></div>
            <div id="mensajeExito" class="hidden mt-3 bg-green-50 text-green-600 text-sm rounded-xl px-4 py-3"></div>
        </div>

        <!-- Consultar notas por estudiante -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-6">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Consultar notas</h2>
            <div class="flex gap-3 mb-4">
                <select id="estudianteConsulta" class="flex-1 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-2.5 text-gray-800 dark:text-white dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Selecciona un estudiante</option>
                </select>
                <button onclick="consultarNotas()" class="bg-gray-800 dark:bg-gray-600 hover:bg-gray-900 text-white font-semibold px-5 py-2.5 rounded-xl transition duration-200">
                    Consultar
                </button>
            </div>
            <div id="listaNotas" class="divide-y divide-gray-100 dark:divide-gray-700"></div>
        </div>

    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');
        const profesorId = localStorage.getItem('profesorId');

        if (!token) window.location.href = 'login.html';

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;

        async function cargarSelectores() {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };

                const estRes = await fetch('http://127.0.0.1:8000/estudiantes/', { headers });
                const estudiantes = await estRes.json();
                const selectEst = document.getElementById('estudianteId');
                const selectConsulta = document.getElementById('estudianteConsulta');

                estudiantes.forEach(e => {
                    const opt = `<option value="${e.id}">${e.nombre} ${e.apellido} - Grado ${e.grado}</option>`;
                    selectEst.innerHTML += opt;
                    selectConsulta.innerHTML += opt;
                });

                const matRes = await fetch('http://127.0.0.1:8000/materias/colegio/1', { headers });
                const materias = await matRes.json();
                const selectMat = document.getElementById('materiaId');
                materias.forEach(m => {
                    selectMat.innerHTML += `<option value="${m.id}">${m.nombre}</option>`;
                });

            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function registrarNota() {
            const estudianteId = document.getElementById('estudianteId').value;
            const materiaId = document.getElementById('materiaId').value;
            const periodo = document.getElementById('periodo').value;
            const nota = document.getElementById('nota').value;
            const observacion = document.getElementById('observacion').value;
            const errorDiv = document.getElementById('mensajeError');
            const exitoDiv = document.getElementById('mensajeExito');

            if (!estudianteId || !materiaId || !nota) {
                errorDiv.textContent = 'Estudiante, materia y nota son obligatorios';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/notas/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        estudiante_id: parseInt(estudianteId),
                        materia_id: parseInt(materiaId),
                        profesor_id: parseInt(profesorId),
                        periodo: parseInt(periodo),
                        nota: parseFloat(nota),
                        observacion: observacion || null
                    })
                });

                if (!res.ok) {
                    errorDiv.textContent = 'Error al guardar la nota';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                exitoDiv.textContent = 'Nota registrada correctamente';
                exitoDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');

                document.getElementById('nota').value = '';
                document.getElementById('observacion').value = '';

                setTimeout(() => exitoDiv.classList.add('hidden'), 2000);

            } catch (error) {
                errorDiv.textContent = 'Error al conectar con el servidor';
                errorDiv.classList.remove('hidden');
            }
        }

        async function consultarNotas() {
            const estudianteId = document.getElementById('estudianteConsulta').value;
            if (!estudianteId) return;

            try {
                const res = await fetch(`http://127.0.0.1:8000/notas/estudiante/${estudianteId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const notas = await res.json();
                const lista = document.getElementById('listaNotas');

                if (notas.length === 0) {
                    lista.innerHTML = '<div class="py-4 text-center text-gray-500 dark:text-gray-400">No hay notas registradas</div>';
                    return;
                }

                // Agrupar notas por período
                const porPeriodo = {};
                notas.forEach(n => {
                    if (!porPeriodo[n.periodo]) porPeriodo[n.periodo] = [];
                    porPeriodo[n.periodo].push(n);
                });

                let html = '';
                Object.keys(porPeriodo).sort().forEach(periodo => {
                    const notasPeriodo = porPeriodo[periodo];
                    const promedio = notasPeriodo.reduce((sum, n) => sum + parseFloat(n.nota), 0) / notasPeriodo.length;
                    const promedioColor = promedio >= 3.0 ? 'text-green-600' : 'text-red-600';
                    const promedioBg = promedio >= 3.0 ? 'bg-green-50 dark:bg-green-900' : 'bg-red-50 dark:bg-red-900';

                    html += `
                        <div class="mb-3 border border-gray-100 dark:border-gray-700 rounded-xl overflow-hidden">
                            <button onclick="togglePeriodo('periodo-${periodo}')"
                                class="w-full flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 transition duration-150">
                                <div class="flex items-center gap-2">
                                    <svg id="flecha-${periodo}" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-gray-500 dark:text-gray-400 transition duration-200">
                                        <path d="M19 9l-7 7-7-7"/>
                                    </svg>
                                    <span class="font-semibold text-gray-700 dark:text-gray-200">Período ${periodo}</span>
                                    <span class="text-xs text-gray-400 dark:text-gray-500">${notasPeriodo.length} nota(s)</span>
                                </div>
                                <span class="text-sm font-bold px-3 py-1 rounded-full ${promedioBg} ${promedioColor}">
                                    Promedio: ${promedio.toFixed(2)}
                                </span>
                            </button>
                            <div id="periodo-${periodo}" class="divide-y divide-gray-100 dark:divide-gray-700">
                                ${notasPeriodo.map(n => `
                                    <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-150">
                                        <div>
                                            <p class="text-sm text-gray-600 dark:text-gray-300">${n.observacion || 'Sin observación'}</p>
                                            <p class="text-xs text-gray-400 dark:text-gray-500">${new Date(n.created_at).toLocaleDateString('es-CO')}</p>
                                        </div>
                                        <span class="text-lg font-bold ${parseFloat(n.nota) >= 3.0 ? 'text-green-600' : 'text-red-600'}">${n.nota}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                lista.innerHTML = html;

            } catch (error) {
                console.error('Error:', error);
            }
        }
        function togglePeriodo(id) {
            const contenido = document.getElementById(id);
            const periodoNum = id.split('-')[1];
            const flecha = document.getElementById(`flecha-${periodoNum}`);
            contenido.classList.toggle('hidden');
            flecha.style.transform = contenido.classList.contains('hidden') ? 'rotate(-90deg)' : 'rotate(0deg)';
        }
        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            localStorage.removeItem('rol');
            localStorage.removeItem('grado_asignado');
            window.location.href = 'login.html';
        }

        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }

        cargarSelectores();
    </script>

</body>
</html>
