<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class'
    }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition duration-300">

    <!-- Barra de navegación -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl p-2">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 10C24 10 14 7 6 10V38C14 35 24 38 24 38C24 38 34 35 42 38V10C34 7 24 10 24 10Z" fill="white" fill-opacity="0.15"/>
                    <path d="M24 10V38" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    <path d="M6 10C14 7 24 10 24 10V38C14 35 6 38 6 38V10Z" fill="white" fill-opacity="0.3"/>
                    <path d="M42 10C34 7 24 10 24 10V38C34 35 42 38 42 38V10Z" fill="white" fill-opacity="0.2"/>
                </svg>
            </div>
            <span class="font-bold text-gray-800 dark:text-white text-lg">SGE</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="nombreProfesor" class="text-gray-600 dark:text-gray-300 text-sm"></span>
            <button onclick="cerrarSesion()" class="text-sm text-red-500 hover:text-red-700 font-medium">
                Cerrar sesión
            </button>
            <button
                onclick="toggleModo()"
                class="bg-gray-100 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-2 hover:shadow-md transition duration-200"
            >
                <svg id="iconoSol" width="18" height="18" fill="none" stroke="#374151" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" class="hidden" width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="max-w-5xl mx-auto px-6 py-8">

        <!-- Saludo -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white" id="saludo">Bienvenid@</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1">Resumen del sistema escolar</p>
        </div>

        <!-- Tarjetas de resumen -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-100 rounded-xl p-3">
                        <svg width="24" height="24" fill="none" stroke="#2563EB" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Estudiantes</p>
                        <p class="text-2xl font-bold text-gray-800 dark:text-white" id="totalEstudiantes">-</p>
                    </div>
                </div>
            </div>

           <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-4">
                    <div class="bg-green-100 rounded-xl p-3">
                        <svg width="24" height="24" fill="none" stroke="#16A34A" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400">Asignaturas</p>
                        <p class="text-2xl font-bold text-gray-800 dark:text-white" id="totalMaterias">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-red-50 dark:bg-red-900 rounded-2xl shadow-sm p-6 border border-red-100 dark:border-red-800">
                <div class="flex items-center gap-4">
                    <div class="bg-red-100 rounded-xl p-3">
                        <svg width="24" height="24" fill="none" stroke="#DC2626" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                    </div>
                    <div>
                        <p class="text-sm text-red-600">En riesgo</p>
                        <p class="text-2xl font-bold text-red-700" id="totalRiesgo">-</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Menú de acciones -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <a href="estudiantes.html" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 hover:border-blue-300 hover:shadow-md transition duration-200 flex items-center gap-4">
                <div class="bg-blue-100 rounded-xl p-3">
                    <svg width="24" height="24" fill="none" stroke="#2563EB" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <line x1="19" y1="8" x2="19" y2="14"/>
                        <line x1="22" y1="11" x2="16" y2="11"/>
                    </svg>
                </div>
                <div>
                    <p class="font-semibold text-gray-800 dark:text-white">Estudiantes</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Gestionar estudiantes del colegio</p>
                </div>
            </a>

            <a href="notas.html" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 hover:border-blue-300 hover:shadow-md transition duration-200 flex items-center gap-4">
                <div class="bg-green-100 rounded-xl p-3">
                    <svg width="24" height="24" fill="none" stroke="#16A34A" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </div>
                <div>
                    <p class="font-semibold text-gray-800 dark:text-white">Notas</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Registrar y consultar notas</p>
                </div>
            </a>

            <a href="asistencia.html" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-700 hover:border-blue-300 hover:shadow-md transition duration-200 flex items-center gap-4">
                <div class="bg-purple-100 rounded-xl p-3">
                    <svg width="24" height="24" fill="none" stroke="#7C3AED" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div>
                    <p class="font-semibold text-gray-800 dark:text-white">Asistencia</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Registrar asistencia diaria</p>
            
                </div>
            </a>

            <a href="ia.html" class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl shadow-sm p-6 hover:shadow-md transition duration-200 flex items-center gap-4">
                <div class="bg-white bg-opacity-20 rounded-xl p-3">
                    <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M12 2a10 10 0 1 0 10 10"/>
                        <path d="M12 6v6l4 2"/>
                        <circle cx="18" cy="5" r="3"/>
                    </svg>
                </div>
                <div>
                    <p class="font-semibold text-white">Asistente IA</p>
                    <p class="text-sm text-blue-200">Analizar estudiantes con la IA</p>
                </div>
            </a>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        const nombre = localStorage.getItem('nombre');
        const apellido = localStorage.getItem('apellido');

        if (!token) {
            window.location.href = 'login.html';
        }

        document.getElementById('nombreProfesor').textContent = `${nombre} ${apellido}`;
        document.getElementById('saludo').textContent = `Bienvenid@, ${nombre}`;

        async function cargarDatos() {
            try {
                const headers = { 'Authorization': `Bearer ${token}` };

                const estudiantesRes = await fetch('http://127.0.0.1:8000/estudiantes/', { headers });
                const estudiantes = await estudiantesRes.json();
                document.getElementById('totalEstudiantes').textContent = estudiantes.length;

                const materiasRes = await fetch('http://127.0.0.1:8000/materias/colegio/1', { headers });
                const materias = await materiasRes.json();
                document.getElementById('totalMaterias').textContent = materias.length;

                const riesgoRes = await fetch('http://127.0.0.1:8000/ia/estudiantes-en-riesgo/1/1', { headers });
                const riesgo = await riesgoRes.json();
                document.getElementById('totalRiesgo').textContent = riesgo.length;

            } catch (error) {
                console.error('Error cargando datos:', error);
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('token');
            localStorage.removeItem('nombre');
            localStorage.removeItem('apellido');
            window.location.href = 'login.html';
        }

        cargarDatos();
        function toggleModo() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            document.getElementById('iconoSol').classList.toggle('hidden');
            document.getElementById('iconoLuna').classList.toggle('hidden');
            localStorage.setItem('modo', html.classList.contains('dark') ? 'dark' : 'light');
        }

        if (localStorage.getItem('modo') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('iconoSol').classList.add('hidden');
            document.getElementById('iconoLuna').classList.remove('hidden');
        }
    </script>


</body>
</html>
